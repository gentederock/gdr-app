<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Test 2</title></head>
<body style="font-family:Arial; padding:20px; font-size:16px;">
<h2>Test fetch CORS directo</h2>
<div id="resultado" style="background:#eee; padding:16px; border-radius:8px; white-space:pre-wrap; word-break:break-all;">Esperando...</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzP5FoVAOj3zK939YJhGQYJp1D3bnYUrJeFRKIsIgs8vwonLcTWUa4FONypA3vND4MWVg/exec';
  const div = document.getElementById('resultado');
  function log(msg) { div.textContent += '\n' + msg; }

  // Test: fetch CORS normal (sin no-cors), intentando LEER la respuesta
  fetch(APPS_SCRIPT_URL + '?accion=mesNombre')
    .then(function(r) {
      log('✅ Fetch CORS respondió. Status: ' + r.status);
      return r.text();
    })
    .then(function(texto) {
      log('✅ Body leído: ' + texto.slice(0, 200));
    })
    .catch(function(e) {
      log('❌ Fetch CORS FALLÓ: ' + e.message);
    });
</script>
</body>
</html>
